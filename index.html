<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Supreme Command | Unasemeje ø dia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --primary: #38bdf8;
  --bg-dark: #020617;
  --bg-card: #0f172a;
  --text-dim: #94a3b8;
  --accent-purple: #8b5cf6;
  --danger: #ef4444;
  --success: #22c55e;
  --warning: #fbbf24;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-dark);
  color: white;
  overflow-x: hidden;
}

/* --- SIDEBAR --- */
.sidebar {
  width: 260px;
  height: 100vh;
  position: fixed;
  background: var(--bg-dark);
  padding: 30px 20px;
  border-right: 1px solid #1e293b;
  z-index: 100;
  overflow-y: auto;
}

.sidebar h2 { color: var(--primary); font-size: 1.2rem; margin-bottom: 40px; }

.sidebar a {
  display: flex;
  align-items: center;
  padding: 12px 15px;
  margin: 8px 0;
  cursor: pointer;
  color: var(--text-dim);
  text-decoration: none;
  border-radius: 10px;
  transition: 0.2s;
}

.sidebar a i { margin-right: 12px; }
.sidebar a:hover, .sidebar a.active { color: white; background: rgba(56, 189, 248, 0.1); }

/* --- MAIN CONTENT --- */
.main { margin-left: 260px; padding: 40px; }

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
  background: var(--bg-card);
  padding: 25px;
  border-radius: 16px;
  border: 1px solid #1e293b;
}

.stat-card h3 { font-size: 0.8rem; color: var(--text-dim); margin: 0; text-transform: uppercase; }
.stat-card p { font-size: 1.8rem; font-weight: bold; margin: 10px 0 0; color: var(--primary); }

.card {
  background: var(--bg-card);
  padding: 25px;
  border-radius: 16px;
  border: 1px solid #1e293b;
  margin-bottom: 20px;
}

/* --- TABLES --- */
.table-container { background: var(--bg-card); border-radius: 12px; border: 1px solid #1e293b; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th { background: #1e293b; text-align: left; padding: 15px; color: var(--primary); }
td { padding: 15px; border-bottom: 1px solid #1e293b; font-size: 0.9rem; }

.search-bar {
    width: 100%;
    padding: 12px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    color: white;
    margin-bottom: 20px;
    box-sizing: border-box;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

.btn-balance { background: var(--primary); color: #082f49; }
.btn-approve { background: var(--success); color: #052e16; }
.btn-danger { background: var(--danger); color: white; }
.btn-success { background: var(--success); color: #052e16; }

/* --- MAINTENANCE STATUS INDICATOR --- */
.maintenance-status {
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
}
.maintenance-status.online {
    background: rgba(34, 197, 94, 0.1);
    border: 2px solid var(--success);
}
.maintenance-status.offline {
    background: rgba(239, 68, 68, 0.1);
    border: 2px solid var(--danger);
}
.status-icon {
    font-size: 32px;
}
.status-icon.online { color: var(--success); }
.status-icon.offline { color: var(--danger); }
.status-text h3 { margin: 0 0 5px 0; }
.status-text p { margin: 0; font-size: 14px; color: var(--text-dim); }

.maintenance-buttons {
    display: flex;
    gap: 15px;
    margin-top: 20px;
    flex-wrap: wrap;
}
.maintenance-buttons button {
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 700;
}

@media (max-width: 768px) {
    .sidebar { width: 70px; }
    .sidebar span, .sidebar h2 { display: none; }
    .main { margin-left: 70px; padding: 20px; }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Supreme Admin</h2>
  <a onclick="loadStats()" id="nav-stats" class="active"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a>
  <a onclick="loadUsers()" id="nav-users"><i class="fas fa-user-shield"></i> <span>User Control</span></a>
  <a onclick="loadDeposits()" id="nav-deposits"><i class="fas fa-money-bill-wave"></i> <span>Deposits</span></a>
  <a onclick="loadOrders()" id="nav-orders"><i class="fas fa-shopping-bag"></i> <span>Orders</span></a>
  
  <!-- NEW: Support Tickets & Ticker Links -->
  <a onclick="loadTickets()" id="nav-tickets"><i class="fas fa-life-ring"></i> <span>Support Tickets</span></a>
  <a onclick="loadTicker()" id="nav-ticker"><i class="fas fa-bullhorn"></i> <span>Top Ticker</span></a>
  
  <a onclick="loadSiteControl()" id="nav-site"><i class="fas fa-globe"></i> <span>Site Control</span></a>
  <hr style="border: 0; border-top: 1px solid #1e293b; margin: 20px 0;">
  <a onclick="location.reload()" style="color: var(--danger);"><i class="fas fa-redo"></i> <span>Refresh</span></a>
</div>

<div class="main">
  <h1 id="pageTitle">Insights & Maintenance</h1>
  
  <div class="stats-grid">
      <div class="stat-card"><h3>Global Users</h3><p id="stat-users">0</p></div>
      <div class="stat-card"><h3>Total Float</h3><p id="stat-money">KES 0</p></div>
      <div class="stat-card"><h3>Action Needed</h3><p id="stat-deposits" style="color:#fbbf24">0</p></div>
  </div>

  <div id="contentArea">
      <div class="card" style="text-align: center; color: var(--text-dim);">
          <i class="fas fa-spinner fa-spin" style="font-size: 24px; margin-bottom: 10px;"></i>
          <p>Loading Supreme Command...</p>
      </div>
  </div>
</div>

<script>
const API = "https://unasemeje-backend.vercel.app/api";

// NO TOKEN NEEDED - DIRECT ACCESS
async function adminFetch(endpoint, method = "GET", body = null) {
  try {
    const opts = {
      method,
      headers: { "Content-Type": "application/json" }
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + endpoint, opts);
    return await res.json();
  } catch (err) { 
      document.getElementById("contentArea").innerHTML = `
        <div class="card" style="color: var(--danger); text-align: center;">
            <h3><i class="fas fa-exclamation-triangle"></i> Server Offline</h3>
            <p>Cannot connect to the backend API.</p>
        </div>`;
      return { error: "Server Offline" }; 
  }
}

/* --- OVERVIEW & DELIX SYNC --- */
async function loadStats() {
    setActiveNav('nav-stats', 'Insights & Maintenance');
    const users = await adminFetch("/admin/users");
    const deposits = await adminFetch("/admin/deposits");
    
    if(!users.error) {
        document.getElementById("stat-users").innerText = users.length;
        const total = users.reduce((s, u) => s + (u.balance || 0), 0);
        document.getElementById("stat-money").innerText = "KES " + total.toLocaleString();
    }
    
    const pending = !deposits.error ? deposits.filter(d => d.status === "pending").length : 0;
    document.getElementById("stat-deposits").innerText = pending;

    document.getElementById("contentArea").innerHTML = `
        <div class="card">
            <h3><i class="fas fa-cloud-download-alt"></i> Delix Provider Sync</h3>
            <p style="color: var(--text-dim)">Fetch the latest services and pricing directly from the Delixgains API.</p>
            <button class="btn-balance" style="padding: 15px 25px;" onclick="syncDelix()"><i class="fas fa-sync"></i> Refresh Delix Services Now</button>
        </div>
    `;
}

async function syncDelix() {
    if(!confirm("Fetch new services from Delix? This updates your whole store.")) return;
    const btn = document.querySelector(".btn-balance");
    btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Syncing...";
    btn.disabled = true;
    
    try {
        const res = await fetch(`${API}/services?refresh=true`);
        const data = await res.json();
        alert(data.success ? "Success! Store updated from Delix." : "Error: " + data.error);
    } catch(e) { alert("Sync failed. Check backend logs."); }
    finally {
        btn.innerHTML = "<i class='fas fa-sync'></i> Refresh Delix Services Now";
        btn.disabled = false;
    }
}

/* --- USER & BALANCE CONTROL --- */
async function loadUsers() {
  setActiveNav('nav-users', 'Master User Control');
  const users = await adminFetch("/admin/users");
  let html = `<input type="text" class="search-bar" placeholder="Search users..." onkeyup="search()">
    <div class="table-container"><table id="userTable">
    <tr><th>Identity</th><th>Balance</th><th>Actions</th></tr>`;

  if(!users.error) {
      users.forEach(u => {
        html += `<tr>
            <td><b>${u.username || 'User'}</b><br><small>${u.email}</small></td>
            <td><span style="color:var(--primary); font-weight:bold;">KES ${(u.balance || 0).toFixed(2)}</span></td>
            <td><button class="btn-balance" onclick="editBal('${u._id}', '${u.email}')">Update Balance</button></td>
          </tr>`;
      });
  }
  document.getElementById("contentArea").innerHTML = html + `</table></div>`;
}

async function editBal(id, email) {
    const amt = prompt(`Set absolute balance for ${email}:`);
    if (amt === null || isNaN(amt)) return;
    const res = await adminFetch("/admin/update-balance", "POST", { userId: id, amount: parseFloat(amt) });
    if(res.success) { alert("Balance updated."); loadUsers(); }
}

/* --- DEPOSITS & ORDERS --- */
async function loadDeposits() {
  setActiveNav('nav-deposits', 'Payment Verification');
  const deposits = await adminFetch("/admin/deposits");
  let html = `<div class="table-container"><table><tr><th>User</th><th>Amount</th><th>Code</th><th>Actions</th></tr>`;

  if(!deposits.error) {
      deposits.filter(d => d.status === "pending").reverse().forEach(d => {
        html += `<tr>
            <td>${d.userEmail}</td>
            <td style="color:var(--success)">KES ${d.amount}</td>
            <td><code>${d.transactionCode}</code></td>
            <td>
              <button class="btn-approve" onclick="actionDep('${d._id}', 'approve')"><i class="fas fa-check"></i></button>
              <button class="btn-danger" onclick="actionDep('${d._id}', 'cancel')"><i class="fas fa-times"></i></button>
            </td>
        </tr>`;
      });
  }
  document.getElementById("contentArea").innerHTML = html + `</table></div>`;
}

async function actionDep(id, type) {
  if(!confirm("Are you sure?")) return;
  const endpoint = type === 'approve' ? "/admin/approve-deposit" : "/admin/cancel-deposit";
  await adminFetch(endpoint, "POST", { depositId: id });
  loadDeposits(); loadStats();
}

async function loadOrders() {
    setActiveNav('nav-orders', 'Live Fulfillment Log');
    const orders = await adminFetch("/admin/orders");
    let html = `<div class="table-container"><table><tr><th>Client</th><th>Service</th><th>Link</th><th>Status</th></tr>`;
    
    if(!orders.error) {
        orders.reverse().slice(0, 50).forEach(o => {
            html += `<tr><td><small>${o.userEmail}</small></td><td>${o.serviceId}</td><td><a href="${o.link}" target="_blank" style="color:var(--primary)">Open Link</a></td><td>${o.status}</td></tr>`;
        });
    }
    document.getElementById("contentArea").innerHTML = html + `</table></div>`;
}

/* =========================================
 * NEW: SUPPORT TICKETS MANAGEMENT
 * ========================================= */
async function loadTickets() {
    setActiveNav('nav-tickets', 'Support Tickets');
    const tickets = await adminFetch("/admin/tickets");
    
    let html = `<div class="table-container"><table><tr><th>User</th><th>Message</th><th>Date</th><th>Status</th><th>Actions</th></tr>`;
    
    if (!tickets.error) {
        if (tickets.length === 0) {
            html += `<tr><td colspan="5" style="text-align:center; color: var(--text-dim); padding: 30px;">No support tickets found.</td></tr>`;
        } else {
            tickets.forEach(t => {
                const date = new Date(t.createdAt).toLocaleString();
                const statusColor = t.status === 'Open' ? 'var(--warning)' : 'var(--success)';
                html += `<tr>
                    <td><b>${t.username || 'Unknown'}</b><br><small style="color:var(--text-dim)">${t.userEmail}</small></td>
                    <td style="max-width: 300px; word-wrap: break-word;">${t.message}</td>
                    <td><small style="color:var(--text-dim)">${date}</small></td>
                    <td><span style="color: ${statusColor}; font-weight: bold;">${t.status}</span></td>
                    <td>
                        ${t.status === 'Open' ? `<button class="btn-success" onclick="resolveTicket('${t._id}')"><i class="fas fa-check"></i> Resolve</button>` : '<small style="color:var(--text-dim)">Closed</small>'}
                    </td>
                </tr>`;
            });
        }
    }
    document.getElementById("contentArea").innerHTML = html + `</table></div>`;
}

async function resolveTicket(id) {
    if (!confirm("Mark this ticket as resolved?")) return;
    const res = await adminFetch("/admin/resolve-ticket", "POST", { ticketId: id });
    if (res.success) {
        loadTickets();
    } else {
        alert("Failed to resolve ticket.");
    }
}

/* =========================================
 * NEW: TOP TICKER MANAGEMENT
 * ========================================= */
let currentTickerItems = [];

async function loadTicker() {
    setActiveNav('nav-ticker', 'Top Ticker Control');
    const data = await adminFetch("/ticker");
    
    currentTickerItems = data.items || [];
    const speed = data.speed || 80;
    
    let itemsHtml = '';
    if (currentTickerItems.length === 0) {
        itemsHtml = `<p style="color: var(--text-dim); text-align: center; padding: 20px;">No ticker messages added yet.</p>`;
    } else {
        currentTickerItems.forEach((item, index) => {
            itemsHtml += `
                <div class="ticker-item-row" id="ticker-row-${index}" style="display: flex; align-items: center; gap: 10px; padding: 12px; background: #1e293b; border-radius: 8px; margin-bottom: 10px;">
                    <span id="ticker-text-${index}" style="flex: 1; color: white; word-break: break-word;">${item}</span>
                    <div style="display: flex; gap: 8px; flex-shrink: 0;">
                        <button class="btn-balance" onclick="editTickerItemUI(${index})" style="padding: 6px 12px; font-size: 12px;"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn-danger" onclick="deleteTickerItem(${index})" style="padding: 6px 12px; font-size: 12px;"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `;
        });
    }

    document.getElementById("contentArea").innerHTML = `
        <div class="card">
            <h3><i class="fas fa-tachometer-alt"></i> Animation Speed Control</h3>
            <p style="color: var(--text-dim)">Control how fast the text moves across the top of the website. (Lower number = faster, Higher number = slower)</p>
            <div style="display: flex; gap: 15px; align-items: center; margin-top: 15px; flex-wrap: wrap;">
                <input type="number" id="tickerSpeedInput" value="${speed}" min="10" max="300" style="width: 100px; padding: 10px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: white; font-size: 16px;">
                <span style="color: var(--text-dim);">seconds per loop</span>
                <button class="btn-balance" onclick="updateTickerSpeed()" style="margin-left: auto;"><i class="fas fa-save"></i> Save Speed</button>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-plus-circle"></i> Add New Ticker Message</h3>
            <div style="display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap;">
                <input type="text" id="newTickerItemInput" placeholder="e.g. 🔥 IG Followers KSh 37" style="flex: 1; min-width: 200px; padding: 12px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: white;">
                <button class="btn-success" onclick="addTickerItem()" style="padding: 12px 24px;"><i class="fas fa-plus"></i> Add Item</button>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-list"></i> Current Ticker Messages</h3>
            <div id="tickerItemsList" style="margin-top: 15px;">
                ${itemsHtml}
            </div>
        </div>
    `;
}

function editTickerItemUI(index) {
    const currentText = currentTickerItems[index];
    const row = document.getElementById(`ticker-row-${index}`);
    
    // Replace text with input and save/cancel buttons
    row.innerHTML = `
        <input type="text" id="edit-input-${index}" value="${currentText.replace(/"/g, '&quot;')}" style="flex: 1; padding: 10px; background: #0f172a; border: 1px solid var(--primary); border-radius: 6px; color: white;">
        <button class="btn-success" onclick="saveTickerItem(${index})" style="padding: 8px 16px;"><i class="fas fa-check"></i> Save</button>
        <button class="btn-danger" onclick="loadTicker()" style="padding: 8px 16px;"><i class="fas fa-times"></i> Cancel</button>
    `;
}

async function saveTickerItem(index) {
    const input = document.getElementById(`edit-input-${index}`);
    const newText = input.value.trim();
    if (!newText) return alert("Text cannot be empty");

    const res = await adminFetch("/admin/ticker/edit", "PUT", { index, text: newText });
    if (res.success) {
        loadTicker();
    } else {
        alert("Failed to update item.");
    }
}

async function deleteTickerItem(index) {
    if (!confirm("Are you sure you want to delete this message?")) return;
    const res = await adminFetch("/admin/ticker/delete", "DELETE", { index });
    if (res.success) {
        loadTicker();
    } else {
        alert("Failed to delete item.");
    }
}

async function addTickerItem() {
    const input = document.getElementById('newTickerItemInput');
    const text = input.value.trim();
    if (!text) return alert("Please enter a message");

    const res = await adminFetch("/admin/ticker/add", "POST", { text });
    if (res.success) {
        input.value = '';
        loadTicker();
    } else {
        alert("Failed to add item.");
    }
}

async function updateTickerSpeed() {
    const speed = parseInt(document.getElementById('tickerSpeedInput').value);
    if (isNaN(speed) || speed < 5) return alert("Speed must be a number greater than 5");

    const res = await adminFetch("/admin/ticker/speed", "PUT", { speed });
    if (res.success) {
        alert("Ticker speed updated successfully!");
    } else {
        alert("Failed to update speed.");
    }
}

/* --- GLOBAL SITE CONTROL (UPDATED WITH CLEAR ON/OFF BUTTONS) --- */
async function loadSiteControl() {
    setActiveNav('nav-site', 'Global Site Control');
    
    // Fetch current maintenance status
    let maintenanceStatus = false;
    try {
        const settings = await fetch(`${API}/settings`);
        const settingsData = await settings.json();
        maintenanceStatus = settingsData.maintenance === true;
    } catch(e) {
        console.log("Could not fetch maintenance status");
    }
    
    document.getElementById("contentArea").innerHTML = `
        <div class="card">
            <h3><i class="fas fa-broadcast-tower"></i> Global Announcements</h3>
            <p style="color: var(--text-dim)">Send a push notification or banner to all active users on the main website.</p>
            <textarea id="announcementText" class="search-bar" style="height: 100px; resize: vertical;" placeholder="Type your message to all users..."></textarea>
            <button class="btn-balance" style="margin-top: 10px; padding: 12px 20px;" onclick="sendAnnouncement()"><i class="fas fa-paper-plane"></i> Broadcast to All Users</button>
        </div>
        
        <div class="card">
            <h3><i class="fas fa-tools"></i> System Maintenance</h3>
            
            <!-- MAINTENANCE STATUS DISPLAY -->
            <div class="maintenance-status ${maintenanceStatus ? 'offline' : 'online'}">
                <div class="status-icon ${maintenanceStatus ? 'offline' : 'online'}">
                    <i class="fas ${maintenanceStatus ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i>
                </div>
                <div class="status-text">
                    <h3 style="color: ${maintenanceStatus ? 'var(--danger)' : 'var(--success)'}">
                        ${maintenanceStatus ? 'MAINTENANCE MODE: ON' : 'MAINTENANCE MODE: OFF'}
                    </h3>
                    <p>${maintenanceStatus ? 'Website is currently BLOCKED for all users' : 'Website is ONLINE and accessible to all users'}</p>
                </div>
            </div>
            
            <!-- SEPARATE ON/OFF BUTTONS -->
            <div class="maintenance-buttons">
                <button class="btn-danger" onclick="turnMaintenanceOn()" ${maintenanceStatus ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>
                    <i class="fas fa-power-off"></i> Turn ON Maintenance
                </button>
                <button class="btn-success" onclick="turnMaintenanceOff()" ${!maintenanceStatus ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>
                    <i class="fas fa-play"></i> Turn OFF Maintenance
                </button>
            </div>
            
            <p style="color: var(--text-dim); font-size: 13px; margin-top: 15px;">
                <i class="fas fa-info-circle"></i> When maintenance is ON, users will see a maintenance page instead of the website.
            </p>
        </div>
        
        <div class="card">
            <h3><i class="fas fa-database"></i> Database Management</h3>
            <p style="color: var(--text-dim)">Clear cached data or reset specific system modules.</p>
            <button class="btn-balance" style="padding: 12px 20px; margin-right: 10px;" onclick="clearCache()"><i class="fas fa-broom"></i> Clear System Cache</button>
            <button class="btn-danger" style="padding: 12px 20px;" onclick="resetSystem()"><i class="fas fa-exclamation-triangle"></i> Reset Failed Transactions</button>
        </div>
    `;
}

async function sendAnnouncement() {
    const msg = document.getElementById('announcementText').value;
    if(!msg) return alert("Please enter a message.");
    const res = await adminFetch("/admin/announce", "POST", { message: msg });
    alert(res.success ? "Broadcast sent successfully!" : "Failed: " + (res.error || "Unknown error"));
}

// NEW: Separate function to turn maintenance ON
async function turnMaintenanceOn() {
    if(!confirm("⚠️ WARNING: This will BLOCK all users from accessing the website. Are you sure?")) return;
    const res = await adminFetch("/admin/maintenance", "POST", { action: "on" });
    if(res.success) {
        alert("✅ Maintenance mode turned ON. Users cannot access the website.");
        loadSiteControl(); // Refresh the page to show updated status
    } else {
        alert("❌ Failed: " + (res.error || "Unknown error"));
    }
}

// NEW: Separate function to turn maintenance OFF
async function turnMaintenanceOff() {
    if(!confirm("Turn OFF maintenance mode? This will allow users to access the website again.")) return;
    const res = await adminFetch("/admin/maintenance", "POST", { action: "off" });
    if(res.success) {
        alert("✅ Maintenance mode turned OFF. Users can now access the website.");
        loadSiteControl(); // Refresh the page to show updated status
    } else {
        alert("❌ Failed: " + (res.error || "Unknown error"));
    }
}

async function clearCache() {
    if(!confirm("Clear all system caches?")) return;
    const res = await adminFetch("/admin/clear-cache", "POST");
    alert(res.success ? "Cache cleared." : "Failed: " + (res.error || "Unknown error"));
}

async function resetSystem() {
    if(!confirm("Reset all failed transactions? This cannot be undone.")) return;
    const res = await adminFetch("/admin/reset-failed", "POST");
    alert(res.success ? "Failed transactions reset." : "Failed: " + (res.error || "Unknown error"));
}

/* --- UTILS --- */
function setActiveNav(id, title) {
    document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById("pageTitle").innerText = title;
}

function search() {
    let filter = document.querySelector(".search-bar").value.toUpperCase();
    let tr = document.getElementById("userTable").getElementsByTagName("tr");
    for (let i = 1; i < tr.length; i++) {
        tr[i].style.display = tr[i].innerText.toUpperCase().includes(filter) ? "" : "none";
    }
}

// LOAD IMMEDIATELY - NO LOGIN, NO PASSWORD, NO EMAIL
window.onload = function() {
    loadStats();
};
</script>
