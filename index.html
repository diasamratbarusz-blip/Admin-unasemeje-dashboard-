<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Supreme Command | Unasemeje ø dia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --primary: #38bdf8;
  --bg-dark: #020617;
  --bg-card: #0f172a;
  --text-dim: #94a3b8;
  --accent-purple: #8b5cf6;
  --danger: #ef4444;
  --success: #22c55e;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-dark);
  color: white;
  overflow-x: hidden;
}

/* --- SIDEBAR --- */
.sidebar {
  width: 260px;
  height: 100vh;
  position: fixed;
  background: var(--bg-dark);
  padding: 30px 20px;
  border-right: 1px solid #1e293b;
  z-index: 100;
  overflow-y: auto;
}

.sidebar h2 { color: var(--primary); font-size: 1.2rem; margin-bottom: 40px; }

.sidebar a {
  display: flex;
  align-items: center;
  padding: 12px 15px;
  margin: 8px 0;
  cursor: pointer;
  color: var(--text-dim);
  text-decoration: none;
  border-radius: 10px;
  transition: 0.2s;
}

.sidebar a i { margin-right: 12px; }
.sidebar a:hover, .sidebar a.active { color: white; background: rgba(56, 189, 248, 0.1); }

/* --- MAIN CONTENT --- */
.main { margin-left: 260px; padding: 40px; }

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
  background: var(--bg-card);
  padding: 25px;
  border-radius: 16px;
  border: 1px solid #1e293b;
}

.stat-card h3 { font-size: 0.8rem; color: var(--text-dim); margin: 0; text-transform: uppercase; }
.stat-card p { font-size: 1.8rem; font-weight: bold; margin: 10px 0 0; color: var(--primary); }

.card {
  background: var(--bg-card);
  padding: 25px;
  border-radius: 16px;
  border: 1px solid #1e293b;
  margin-bottom: 20px;
}

/* --- TABLES --- */
.table-container { background: var(--bg-card); border-radius: 12px; border: 1px solid #1e293b; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th { background: #1e293b; text-align: left; padding: 15px; color: var(--primary); }
td { padding: 15px; border-bottom: 1px solid #1e293b; font-size: 0.9rem; }

.search-bar {
    width: 100%;
    padding: 12px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    color: white;
    margin-bottom: 20px;
    box-sizing: border-box;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

.btn-balance { background: var(--primary); color: #082f49; }
.btn-approve { background: var(--success); color: #052e16; }
.btn-danger { background: var(--danger); color: white; }

@media (max-width: 768px) {
    .sidebar { width: 70px; }
    .sidebar span, .sidebar h2 { display: none; }
    .main { margin-left: 70px; padding: 20px; }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Supreme Admin</h2>
  <a onclick="loadStats()" id="nav-stats" class="active"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a>
  <a onclick="loadUsers()" id="nav-users"><i class="fas fa-user-shield"></i> <span>User Control</span></a>
  <a onclick="loadDeposits()" id="nav-deposits"><i class="fas fa-money-bill-wave"></i> <span>Deposits</span></a>
  <a onclick="loadOrders()" id="nav-orders"><i class="fas fa-shopping-bag"></i> <span>Orders</span></a>
  <a onclick="loadSiteControl()" id="nav-site"><i class="fas fa-globe"></i> <span>Site Control</span></a>
  <hr style="border: 0; border-top: 1px solid #1e293b; margin: 20px 0;">
  <a onclick="location.reload()" style="color: var(--danger);"><i class="fas fa-redo"></i> <span>Refresh</span></a>
</div>

<div class="main">
  <h1 id="pageTitle">Insights & Maintenance</h1>
  
  <div class="stats-grid">
      <div class="stat-card"><h3>Global Users</h3><p id="stat-users">0</p></div>
      <div class="stat-card"><h3>Total Float</h3><p id="stat-money">KES 0</p></div>
      <div class="stat-card"><h3>Action Needed</h3><p id="stat-deposits" style="color:#fbbf24">0</p></div>
  </div>

  <div id="contentArea">
      <div class="card" style="text-align: center; color: var(--text-dim);">
          <i class="fas fa-spinner fa-spin" style="font-size: 24px; margin-bottom: 10px;"></i>
          <p>Connecting to Supreme Command...</p>
      </div>
  </div>
</div>

<script>
const API = "https://unasemeje-backend.vercel.app/api";
let token = localStorage.getItem("token") || "";

async function adminFetch(endpoint, method = "GET", body = null) {
  try {
    const opts = {
      method,
      headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" }
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + endpoint, opts);
    return await res.json();
  } catch (err) { return { error: "Server Offline" }; }
}

/* --- OVERVIEW & DELIX SYNC --- */
async function loadStats() {
    setActiveNav('nav-stats', 'Insights & Maintenance');
    const users = await adminFetch("/admin/users");
    const deposits = await adminFetch("/admin/deposits");
    
    if(!users.error) {
        document.getElementById("stat-users").innerText = users.length;
        const total = users.reduce((s, u) => s + (u.balance || 0), 0);
        document.getElementById("stat-money").innerText = "KES " + total.toLocaleString();
    }
    
    const pending = !deposits.error ? deposits.filter(d => d.status === "pending").length : 0;
    document.getElementById("stat-deposits").innerText = pending;

    document.getElementById("contentArea").innerHTML = `
        <div class="card">
            <h3><i class="fas fa-cloud-download-alt"></i> Delix Provider Sync</h3>
            <p style="color: var(--text-dim)">Fetch the latest services and pricing directly from the Delixgains API.</p>
            <button class="btn-balance" style="padding: 15px 25px;" onclick="syncDelix()"><i class="fas fa-sync"></i> Refresh Delix Services Now</button>
        </div>
    `;
}

async function syncDelix() {
    if(!confirm("Fetch new services from Delix? This updates your whole store.")) return;
    const btn = document.querySelector(".btn-balance");
    btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Syncing...";
    btn.disabled = true;
    
    try {
        const res = await fetch(`${API}/services?refresh=true`, { headers: { "Authorization": "Bearer " + token } });
        const data = await res.json();
        alert(data.success ? "Success! Store updated from Delix." : "Error: " + data.error);
    } catch(e) { alert("Sync failed. Check backend logs."); }
    finally {
        btn.innerHTML = "<i class='fas fa-sync'></i> Refresh Delix Services Now";
        btn.disabled = false;
    }
}

/* --- USER & BALANCE CONTROL --- */
async function loadUsers() {
  setActiveNav('nav-users', 'Master User Control');
  const users = await adminFetch("/admin/users");
  let html = `<input type="text" class="search-bar" placeholder="Search users..." onkeyup="search()">
    <div class="table-container"><table id="userTable">
    <tr><th>Identity</th><th>Balance</th><th>Actions</th></tr>`;

  if(!users.error) {
      users.forEach(u => {
        html += `<tr>
            <td><b>${u.username || 'User'}</b><br><small>${u.email}</small></td>
            <td><span style="color:var(--primary); font-weight:bold;">KES ${(u.balance || 0).toFixed(2)}</span></td>
            <td><button class="btn-balance" onclick="editBal('${u._id}', '${u.email}')">Update Balance</button></td>
          </tr>`;
      });
  }
  document.getElementById("contentArea").innerHTML = html + `</table></div>`;
}

async function editBal(id, email) {
    const amt = prompt(`Set absolute balance for ${email}:`);
    if (amt === null || isNaN(amt)) return;
    const res = await adminFetch("/admin/update-balance", "POST", { userId: id, amount: parseFloat(amt) });
    if(res.success) { alert("Balance updated."); loadUsers(); }
}

/* --- DEPOSITS & ORDERS --- */
async function loadDeposits() {
  setActiveNav('nav-deposits', 'Payment Verification');
  const deposits = await adminFetch("/admin/deposits");
  let html = `<div class="table-container"><table><tr><th>User</th><th>Amount</th><th>Code</th><th>Actions</th></tr>`;

  if(!deposits.error) {
      deposits.filter(d => d.status === "pending").reverse().forEach(d => {
        html += `<tr>
            <td>${d.userEmail}</td>
            <td style="color:var(--success)">KES ${d.amount}</td>
            <td><code>${d.transactionCode}</code></td>
            <td>
              <button class="btn-approve" onclick="actionDep('${d._id}', 'approve')"><i class="fas fa-check"></i></button>
              <button class="btn-danger" onclick="actionDep('${d._id}', 'cancel')"><i class="fas fa-times"></i></button>
            </td>
        </tr>`;
      });
  }
  document.getElementById("contentArea").innerHTML = html + `</table></div>`;
}

async function actionDep(id, type) {
  if(!confirm("Are you sure?")) return;
  const endpoint = type === 'approve' ? "/admin/approve-deposit" : "/admin/cancel-deposit";
  await adminFetch(endpoint, "POST", { depositId: id });
  loadDeposits(); loadStats();
}

async function loadOrders() {
    setActiveNav('nav-orders', 'Live Fulfillment Log');
    const orders = await adminFetch("/admin/orders");
    let html = `<div class="table-container"><table><tr><th>Client</th><th>Service</th><th>Link</th><th>Status</th></tr>`;
    
    if(!orders.error) {
        orders.reverse().slice(0, 50).forEach(o => {
            html += `<tr><td><small>${o.userEmail}</small></td><td>${o.serviceId}</td><td><a href="${o.link}" target="_blank" style="color:var(--primary)">Open Link</a></td><td>${o.status}</td></tr>`;
        });
    }
    document.getElementById("contentArea").innerHTML = html + `</table></div>`;
}

/* --- GLOBAL SITE CONTROL --- */
async function loadSiteControl() {
    setActiveNav('nav-site', 'Global Site Control');
    document.getElementById("contentArea").innerHTML = `
        <div class="card">
            <h3><i class="fas fa-broadcast-tower"></i> Global Announcements</h3>
            <p style="color: var(--text-dim)">Send a push notification or banner to all active users on the main website.</p>
            <textarea id="announcementText" class="search-bar" style="height: 100px; resize: vertical;" placeholder="Type your message to all users..."></textarea>
            <button class="btn-balance" style="margin-top: 10px; padding: 12px 20px;" onclick="sendAnnouncement()"><i class="fas fa-paper-plane"></i> Broadcast to All Users</button>
        </div>
        <div class="card">
            <h3><i class="fas fa-tools"></i> System Maintenance</h3>
            <p style="color: var(--text-dim)">Temporarily disable user access to the main website for critical updates.</p>
            <button class="btn-danger" style="padding: 12px 20px;" onclick="toggleMaintenance()"><i class="fas fa-power-off"></i> Toggle Maintenance Mode</button>
        </div>
        <div class="card">
            <h3><i class="fas fa-database"></i> Database Management</h3>
            <p style="color: var(--text-dim)">Clear cached data or reset specific system modules.</p>
            <button class="btn-balance" style="padding: 12px 20px; margin-right: 10px;" onclick="clearCache()"><i class="fas fa-broom"></i> Clear System Cache</button>
            <button class="btn-danger" style="padding: 12px 20px;" onclick="resetSystem()"><i class="fas fa-exclamation-triangle"></i> Reset Failed Transactions</button>
        </div>
    `;
}

async function sendAnnouncement() {
    const msg = document.getElementById('announcementText').value;
    if(!msg) return alert("Please enter a message.");
    const res = await adminFetch("/admin/announce", "POST", { message: msg });
    alert(res.success ? "Broadcast sent successfully!" : "Failed: " + (res.error || "Unknown error"));
}

async function toggleMaintenance() {
    if(!confirm("Are you sure you want to toggle Maintenance Mode? This will affect all users.")) return;
    const res = await adminFetch("/admin/maintenance", "POST");
    alert(res.success ? "Maintenance mode toggled." : "Failed: " + (res.error || "Unknown error"));
}

async function clearCache() {
    if(!confirm("Clear all system caches?")) return;
    const res = await adminFetch("/admin/clear-cache", "POST");
    alert(res.success ? "Cache cleared." : "Failed: " + (res.error || "Unknown error"));
}

async function resetSystem() {
    if(!confirm("Reset all failed transactions? This cannot be undone.")) return;
    const res = await adminFetch("/admin/reset-failed", "POST");
    alert(res.success ? "Failed transactions reset." : "Failed: " + (res.error || "Unknown error"));
}

/* --- UTILS --- */
function setActiveNav(id, title) {
    document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById("pageTitle").innerText = title;
}

function search() {
    let filter = document.querySelector(".search-bar").value.toUpperCase();
    let tr = document.getElementById("userTable").getElementsByTagName("tr");
    for (let i = 1; i < tr.length; i++) {
        tr[i].style.display = tr[i].innerText.toUpperCase().includes(filter) ? "" : "none";
    }
}

// --- SILENT BACKGROUND LOGIN ---
async function silentLogin() {
    // If we already have a token, just load the dashboard
    if (token) {
        loadStats();
        return;
    }

    // Otherwise, secretly log in in the background
    try {
        const res = await fetch(API + "/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                identifier: "diasamratbarusz@gmail.com", // Your admin email
                password: "YOUR_ADMIN_PASSWORD_HERE"     // <--- PUT YOUR ACTUAL ADMIN PASSWORD HERE
            })
        });
        const data = await res.json();
        
        if (data.token) {
            token = data.token;
            localStorage.setItem("token", token);
            loadStats(); // Now load the dashboard with the new token
        } else {
            document.getElementById("contentArea").innerHTML = `
                <div class="card" style="color: var(--danger); text-align: center;">
                    <h3><i class="fas fa-exclamation-triangle"></i> Connection Failed</h3>
                    <p>Could not auto-login. Please update your admin password in the <code>index.html</code> code.</p>
                    <p style="font-size: 0.8rem; color: var(--text-dim);">Error: ${data.error || "Invalid credentials"}</p>
                </div>`;
        }
    } catch (e) {
        document.getElementById("contentArea").innerHTML = `
            <div class="card" style="color: var(--danger); text-align: center;">
                <h3><i class="fas fa-exclamation-triangle"></i> Server Offline</h3>
                <p>Cannot connect to the backend API. Check CORS settings in server.js.</p>
            </div>`;
    }
}

// Load dashboard immediately on page load
window.onload = function() {
    silentLogin();
};
</script>
</body>
</html>
