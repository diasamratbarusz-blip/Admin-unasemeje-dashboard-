<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Supreme Command | UNASEMEJE SMM GAINS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root {
  --primary: #38bdf8;
  --bg-dark: #020617;
  --bg-card: #0f172a;
  --text-dim: #94a3b8;
  --accent-purple: #8b5cf6;
  --danger: #ef4444;
  --success: #22c55e;
  --warning: #fbbf24;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-dark);
  color: white;
  overflow-x: hidden;
}

/* --- SIDEBAR --- */
.sidebar {
  width: 260px;
  height: 100vh;
  position: fixed;
  background: var(--bg-dark);
  padding: 30px 20px;
  border-right: 1px solid #1e293b;
  z-index: 100;
  overflow-y: auto;
}

.sidebar h2 { 
  color: var(--primary); 
  font-size: 1.2rem; 
  margin-bottom: 10px;
  text-align: center;
}

.sidebar .site-name {
  text-align: center;
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 30px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.sidebar a {
  display: flex;
  align-items: center;
  padding: 12px 15px;
  margin: 8px 0;
  cursor: pointer;
  color: var(--text-dim);
  text-decoration: none;
  border-radius: 10px;
  transition: 0.2s;
}

.sidebar a i { margin-right: 12px; }
.sidebar a:hover, .sidebar a.active { color: white; background: rgba(56, 189, 248, 0.1); }

/* --- MAIN CONTENT --- */
.main { margin-left: 260px; padding: 40px; }

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
  background: var(--bg-card);
  padding: 25px;
  border-radius: 16px;
  border: 1px solid #1e293b;
}

.stat-card h3 { font-size: 0.8rem; color: var(--text-dim); margin: 0; text-transform: uppercase; }
.stat-card p { font-size: 1.8rem; font-weight: bold; margin: 10px 0 0; color: var(--primary); }

.card {
  background: var(--bg-card);
  padding: 25px;
  border-radius: 16px;
  border: 1px solid #1e293b;
  margin-bottom: 20px;
}

/* --- TABLES --- */
.table-container { background: var(--bg-card); border-radius: 12px; border: 1px solid #1e293b; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th { background: #1e293b; text-align: left; padding: 15px; color: var(--primary); }
td { padding: 15px; border-bottom: 1px solid #1e293b; font-size: 0.9rem; }

.search-bar {
    width: 100%;
    padding: 12px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    color: white;
    margin-bottom: 20px;
    box-sizing: border-box;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

button:hover { opacity: 0.8; }
button:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-balance { background: var(--primary); color: #082f49; }
.btn-approve { background: var(--success); color: #052e16; }
.btn-danger { background: var(--danger); color: white; }
.btn-success { background: var(--success); color: #052e16; }
.btn-purple { background: var(--accent-purple); color: white; }

/* --- ALERTS --- */
.alert {
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
}
.alert-success { background: rgba(34, 197, 94, 0.1); border: 1px solid var(--success); color: #86efac; }
.alert-error { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: #fca5a5; }
.alert-info { background: rgba(56, 189, 248, 0.1); border: 1px solid var(--primary); color: #7dd3fc; }

/* --- LOADING SPINNER --- */
.spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    border-top-color: currentColor;
    animation: spin 0.8s ease-in-out infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* --- MAINTENANCE STATUS INDICATOR --- */
.maintenance-status {
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
}
.maintenance-status.online { background: rgba(34, 197, 94, 0.1); border: 2px solid var(--success); }
.maintenance-status.offline { background: rgba(239, 68, 68, 0.1); border: 2px solid var(--danger); }
.status-icon { font-size: 32px; }
.status-icon.online { color: var(--success); }
.status-icon.offline { color: var(--danger); }
.status-text h3 { margin: 0 0 5px 0; }
.status-text p { margin: 0; font-size: 14px; color: var(--text-dim); }

.maintenance-buttons { display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap; }
.maintenance-buttons button { padding: 12px 24px; font-size: 14px; font-weight: 700; }

/* --- CUSTOM TOGGLE SWITCH (DARK THEME) --- */
.toggle-switch {
    position: relative;
    display: inline-block;
    width: 46px;
    height: 24px;
    flex-shrink: 0;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: #334155;
    transition: .3s;
    border-radius: 24px;
}
.slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: .3s;
    border-radius: 50%;
}
input:checked + .slider { background-color: var(--primary); }
input:checked + .slider:before { transform: translateX(22px); }

/* --- AUDIO FILE DISPLAY --- */
.uploaded-file-card {
    background: #1e293b;
    border-radius: 12px;
    padding: 15px;
    margin-top: 15px;
    border: 1px solid #334155;
}

.file-info {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
}

.file-icon {
    width: 40px;
    height: 40px;
    background: rgba(139, 92, 246, 0.2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent-purple);
    font-size: 18px;
}

.file-details {
    flex: 1;
}

.file-details h4 {
    margin: 0;
    color: white;
    font-size: 14px;
}

.file-details small {
    color: var(--text-dim);
    font-size: 12px;
}

.audio-player {
    width: 100%;
    margin-top: 10px;
    height: 40px;
}

.file-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
}

.no-file {
    text-align: center;
    padding: 20px;
    color: var(--text-dim);
    font-style: italic;
}

@media (max-width: 768px) {
    .sidebar { width: 70px; }
    .sidebar span, .sidebar h2, .sidebar .site-name { display: none; }
    .main { margin-left: 70px; padding: 20px; }
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Supreme Admin</h2>
  <div class="site-name">UNASEMEJE SMM GAINS</div>
  <a onclick="loadStats()" id="nav-stats" class="active"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a>
  <a onclick="loadUsers()" id="nav-users"><i class="fas fa-user-shield"></i> <span>User Control</span></a>
  <a onclick="loadDeposits()" id="nav-deposits"><i class="fas fa-money-bill-wave"></i> <span>Deposits</span></a>
  <a onclick="loadOrders()" id="nav-orders"><i class="fas fa-shopping-bag"></i> <span>Orders</span></a>
  
  <a onclick="loadTickets()" id="nav-tickets"><i class="fas fa-life-ring"></i> <span>Support Tickets</span></a>
  <a onclick="loadTicker()" id="nav-ticker"><i class="fas fa-bullhorn"></i> <span>Top Ticker</span></a>
  <a onclick="loadChatLogs()" id="nav-chatlogs"><i class="fas fa-shield-alt"></i> <span>Chat Security</span></a>
  
  <a onclick="loadAudioSettingsAdmin()" id="nav-audio"><i class="fas fa-music"></i> <span>Audio Settings</span></a>

  <a onclick="loadSiteControl()" id="nav-site"><i class="fas fa-globe"></i> <span>Site Control</span></a>
  <hr style="border: 0; border-top: 1px solid #1e293b; margin: 20px 0;">
  <a onclick="location.reload()" style="color: var(--danger);"><i class="fas fa-redo"></i> <span>Refresh</span></a>
</div>

<div class="main">
  <h1 id="pageTitle">Insights & Maintenance</h1>
  
  <div id="alertArea"></div>
  
  <div class="stats-grid">
      <div class="stat-card"><h3>Global Users</h3><p id="stat-users">0</p></div>
      <div class="stat-card"><h3>Total Float</h3><p id="stat-money">KES 0</p></div>
      <div class="stat-card"><h3>Action Needed</h3><p id="stat-deposits" style="color:#fbbf24">0</p></div>
  </div>

  <div id="contentArea">
      <div class="card" style="text-align: center; color: var(--text-dim);">
          <i class="fas fa-spinner fa-spin" style="font-size: 24px; margin-bottom: 10px;"></i>
          <p>Loading Supreme Command...</p>
      </div>
  </div>
</div>

<script>
const API = "https://unasemeje-backend.vercel.app/api";

function showAlert(type, message) {
    const alertArea = document.getElementById('alertArea');
    const alertClass = type === 'success' ? 'alert-success' : type === 'error' ? 'alert-error' : 'alert-info';
    const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
    
    alertArea.innerHTML = `
        <div class="alert ${alertClass}">
            <i class="fas ${icon}"></i>
            <span>${message}</span>
        </div>
    `;
    
    setTimeout(() => { alertArea.innerHTML = ''; }, 5000);
}

async function adminFetch(endpoint, method = "GET", body = null) {
  try {
    const opts = {
      method,
      headers: { "Content-Type": "application/json" }
    };
    if (body) opts.body = JSON.stringify(body);
    
    const res = await fetch(API + endpoint, opts);
    
    if (!res.ok) {
        const errorText = await res.text();
        return { error: `HTTP ${res.status}: ${errorText}`, success: false };
    }
    
    const data = await res.json();
    return data;
  } catch (err) { 
      document.getElementById("contentArea").innerHTML = `
        <div class="card" style="color: var(--danger); text-align: center;">
            <h3><i class="fas fa-exclamation-triangle"></i> Server Offline</h3>
            <p>Cannot connect to the backend API.</p>
            <p style="font-size: 12px; color: var(--text-dim);">Error: ${err.message}</p>
        </div>`;
      return { error: "Server Offline: " + err.message, success: false }; 
  }
}

/* =========================================
 * 📁 AUDIO FILE UPLOAD HANDLER (BASE64)
 * Converts file to Base64 and sends to backend
 * ========================================= */
async function uploadAudioFile(fileInputId, urlInputId, btnId, audioType) {
    const fileInput = document.getElementById(fileInputId);
    const urlInput = document.getElementById(urlInputId);
    const btn = document.getElementById(btnId);
    
    if (!fileInput.files || !fileInput.files[0]) {
        showAlert('error', 'Please select an audio file first!');
        return;
    }
    
    const file = fileInput.files[0];
    
    // Check file size (max 10MB)
    if (file.size > 10 * 1024 * 1024) {
        showAlert('error', 'File too large! Maximum size is 10MB.');
        return;
    }
    
    // Check file type
    if (!file.type.startsWith('audio/')) {
        showAlert('error', 'Please upload an audio file (MP3, WAV, OGG).');
        return;
    }
    
    btn.innerHTML = '<span class="spinner"></span> Processing...';
    btn.disabled = true;
    
    try {
        // Convert file to Base64 using FileReader
        const base64Data = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
        
        btn.innerHTML = '<span class="spinner"></span> Uploading...';
        
        // Send to backend
        const res = await fetch(API + '/admin/audio/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                audioType: audioType,
                audioData: base64Data,
                fileName: file.name,
                fileSize: file.size
            })
        });
        
        const data = await res.json();
        
        if (data.success) {
            urlInput.value = data.url;
            showAlert('success', `✅ File "${file.name}" uploaded successfully!`);
            fileInput.value = ''; // Clear file input
            
            // Reload the audio settings to show the uploaded file
            loadAudioSettingsAdmin();
        } else {
            showAlert('error', 'Upload failed: ' + (data.error || 'Unknown error'));
        }
    } catch (err) {
        showAlert('error', 'Upload error: ' + err.message);
    } finally {
        btn.innerHTML = '<i class="fas fa-upload"></i> Upload';
        btn.disabled = false;
    }
}

/* =========================================
 * 🗑️ DELETE UPLOADED AUDIO FILE
 * ========================================= */
async function deleteAudioFile(audioType, urlInputId) {
    if (!confirm('Are you sure you want to delete this audio file?')) return;
    
    try {
        const res = await fetch(API + '/admin/audio/file/' + audioType, {
            method: 'DELETE'
        });
        
        const data = await res.json();
        
        if (data.success) {
            document.getElementById(urlInputId).value = '';
            showAlert('success', 'Audio file deleted successfully!');
            loadAudioSettingsAdmin();
        } else {
            showAlert('error', 'Failed to delete: ' + (data.error || 'Unknown error'));
        }
    } catch (err) {
        showAlert('error', 'Delete error: ' + err.message);
    }
}

/* =========================================
 * 🎵 AUDIO & SOUND MANAGEMENT (WITH FILE DISPLAY)
 * ========================================= */
async function loadAudioSettingsAdmin() {
    setActiveNav('nav-audio', 'Audio & Sound Settings');
    
    document.getElementById("contentArea").innerHTML = `
        <div class="card" style="text-align: center; color: var(--text-dim);">
            <i class="fas fa-spinner fa-spin" style="font-size: 24px; margin-bottom: 10px;"></i>
            <p>Loading Audio Settings...</p>
        </div>
    `;

    const data = await adminFetch("/admin/audio/settings");
    
    if (data.error) {
        document.getElementById("contentArea").innerHTML = `<div class="card" style="color:var(--danger)">Failed to load audio settings: ${data.error}</div>`;
        return;
    }

    const settings = data.data;
    const parseBool = (val) => val === true || val === 'true' || val === 1 || val === '1';

    const bgMusic = settings.bgMusic || { enabled: true, url: '', volume: 0.3 };
    const welcomeVoice = settings.welcomeVoice || { enabled: false, url: '' };
    const successSound = settings.successSound || { enabled: true, url: '' };
    const notificationSound = settings.notificationSound || { enabled: true, url: '' };
    const loginSound = settings.loginSound || { enabled: true, url: '' };

    // Helper function to check if URL is a Base64 data URL
    const isBase64 = (url) => url && url.startsWith('data:audio/');
    
    // Helper to get file size from Base64
    const getBase64Size = (base64) => {
        if (!base64 || !isBase64(base64)) return null;
        const base64Length = base64.length - (base64.indexOf(',') + 1);
        const sizeInBytes = (base64Length * 3) / 4;
        return (sizeInBytes / 1024 / 1024).toFixed(2);
    };

    // Generate file display HTML
    const generateFileDisplay = (url, audioType, urlInputId) => {
        if (!url) {
            return `<div class="no-file"><i class="fas fa-file-audio"></i> No file uploaded yet</div>`;
        }
        
        if (isBase64(url)) {
            const size = getBase64Size(url);
            return `
                <div class="uploaded-file-card">
                    <div class="file-info">
                        <div class="file-icon">
                            <i class="fas fa-file-audio"></i>
                        </div>
                        <div class="file-details">
                            <h4>Uploaded Audio File</h4>
                            <small>Size: ${size} MB • Stored in Database</small>
                        </div>
                    </div>
                    <audio controls class="audio-player" src="${url}"></audio>
                    <div class="file-actions">
                        <button type="button" class="btn-danger" onclick="deleteAudioFile('${audioType}', '${urlInputId}')" style="padding: 8px 16px; font-size: 12px;">
                            <i class="fas fa-trash"></i> Delete File
                        </button>
                    </div>
                </div>
            `;
        } else if (url.startsWith('http')) {
            return `
                <div class="uploaded-file-card">
                    <div class="file-info">
                        <div class="file-icon">
                            <i class="fas fa-link"></i>
                        </div>
                        <div class="file-details">
                            <h4>External URL</h4>
                            <small>${url.substring(0, 50)}...</small>
                        </div>
                    </div>
                    <audio controls class="audio-player" src="${url}"></audio>
                </div>
            `;
        } else {
            return `
                <div class="uploaded-file-card">
                    <div class="file-info">
                        <div class="file-icon">
                            <i class="fas fa-folder-open"></i>
                        </div>
                        <div class="file-details">
                            <h4>Local File</h4>
                            <small>${url}</small>
                        </div>
                    </div>
                    <audio controls class="audio-player" src="${url}"></audio>
                </div>
            `;
        }
    };

    document.getElementById("contentArea").innerHTML = `
        <form id="audioSettingsForm" onsubmit="saveAudioSettingsAdmin(event)">
            
            <!-- Background Music -->
            <div class="card">
                <h3><i class="fas fa-music" style="color: var(--primary);"></i> Background Music</h3>
                <p style="color: var(--text-dim); font-size: 14px;">Continuous music playing in the background of the website.</p>
                <div style="display: flex; align-items: center; gap: 15px; margin-top: 15px; flex-wrap: wrap;">
                    <label class="toggle-switch">
                        <input type="checkbox" id="bgMusicEnabled" ${parseBool(bgMusic.enabled) ? 'checked' : ''}>
                        <span class="slider"></span>
                    </label>
                    <span>Enable Background Music</span>
                </div>
                <div style="margin-top: 20px;">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 14px;">📁 Upload Audio File (MP3, WAV, OGG - Max 10MB)</label>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
                        <input type="file" id="bgMusicFile" accept="audio/*" style="flex: 1; min-width: 150px; padding: 8px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: white; font-size: 13px;">
                        <button type="button" class="btn-success" onclick="uploadAudioFile('bgMusicFile', 'bgMusicUrl', 'bgMusicUploadBtn', 'bgMusic')" id="bgMusicUploadBtn" style="padding: 10px 15px; white-space: nowrap;">
                            <i class="fas fa-upload"></i> Upload
                        </button>
                    </div>
                    <label style="display: block; margin-top: 15px; margin-bottom: 8px; color: var(--text-dim); font-size: 14px;">Or Paste External URL</label>
                    <input type="text" id="bgMusicUrl" value="${isBase64(bgMusic.url) ? '' : (bgMusic.url || '')}" class="search-bar" style="margin-bottom: 0;" placeholder="https://... or /sounds/...">
                    
                    ${generateFileDisplay(bgMusic.url, 'bgMusic', 'bgMusicUrl')}
                </div>
                <div style="margin-top: 20px;">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 14px;">Volume: <span id="bgVolumeDisplay">${Math.round((bgMusic.volume || 0.3) * 100)}</span>%</label>
                    <input type="range" id="bgMusicVolume" min="0" max="100" value="${Math.round((bgMusic.volume || 0.3) * 100)}" 
                           oninput="document.getElementById('bgVolumeDisplay').textContent = this.value"
                           style="width: 100%; accent-color: var(--primary);">
                </div>
            </div>

            <!-- Welcome Voice Broadcast -->
            <div class="card" style="border-left: 4px solid var(--accent-purple);">
                <h3><i class="fas fa-broadcast-tower" style="color: var(--accent-purple);"></i> Login Welcome Broadcast (Radio Style)</h3>
                <p style="color: var(--text-dim); font-size: 14px;">
                    Plays a voice message when the user logs in. Background music will play quietly during the speech, then fade in.
                </p>
                <div style="display: flex; align-items: center; gap: 15px; margin-top: 15px; flex-wrap: wrap;">
                    <label class="toggle-switch">
                        <input type="checkbox" id="welcomeVoiceEnabled" ${parseBool(welcomeVoice.enabled) ? 'checked' : ''}>
                        <span class="slider"></span>
                    </label>
                    <span>Enable Welcome Voice</span>
                </div>
                <div style="margin-top: 20px;">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 14px;">📁 Upload Voice File (MP3, WAV, OGG - Max 10MB)</label>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
                        <input type="file" id="welcomeVoiceFile" accept="audio/*" style="flex: 1; min-width: 150px; padding: 8px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: white; font-size: 13px;">
                        <button type="button" class="btn-success" onclick="uploadAudioFile('welcomeVoiceFile', 'welcomeVoiceUrl', 'welcomeVoiceUploadBtn', 'welcomeVoice')" id="welcomeVoiceUploadBtn" style="padding: 10px 15px; white-space: nowrap;">
                            <i class="fas fa-upload"></i> Upload
                        </button>
                    </div>
                    <label style="display: block; margin-top: 15px; margin-bottom: 8px; color: var(--text-dim); font-size: 14px;">Or Paste External URL</label>
                    <input type="text" id="welcomeVoiceUrl" value="${isBase64(welcomeVoice.url) ? '' : (welcomeVoice.url || '')}" class="search-bar" style="margin-bottom: 0;" placeholder="https://... or /sounds/...">
                    
                    ${generateFileDisplay(welcomeVoice.url, 'welcomeVoice', 'welcomeVoiceUrl')}
                </div>
            </div>

            <!-- Success Sound -->
            <div class="card">
                <h3><i class="fas fa-check-circle" style="color: var(--success);"></i> Success Sound</h3>
                <p style="color: var(--text-dim); font-size: 14px;">Played when a payment or deposit is successfully completed.</p>
                <div style="display: flex; align-items: center; gap: 15px; margin-top: 15px; flex-wrap: wrap;">
                    <label class="toggle-switch">
                        <input type="checkbox" id="successSoundEnabled" ${parseBool(successSound.enabled) ? 'checked' : ''}>
                        <span class="slider"></span>
                    </label>
                    <span>Enable Success Sound</span>
                </div>
                <div style="margin-top: 20px;">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 14px;">📁 Upload Sound File (MP3, WAV, OGG - Max 10MB)</label>

/* --- OVERVIEW & DELIX SYNC --- */
async function loadStats() {
    setActiveNav('nav-stats', 'Insights & Maintenance');
    const users = await adminFetch("/admin/users");
    const deposits = await adminFetch("/admin/deposits");
    
    if(!users.error) {
        document.getElementById("stat-users").innerText = users.length;
        const total = users.reduce((s, u) => s + (u.balance || 0), 0);
        document.getElementById("stat-money").innerText = "KES " + total.toLocaleString();
    }
    
    const pending = !deposits.error ? deposits.filter(d => d.status === "pending").length : 0;
    document.getElementById("stat-deposits").innerText = pending;

    document.getElementById("contentArea").innerHTML = `
        <div class="card">
            <h3><i class="fas fa-cloud-download-alt"></i> Delix Provider Sync</h3>
            <p style="color: var(--text-dim)">Fetch the latest services and pricing directly from the Delixgains API.</p>
            <button class="btn-balance" id="syncBtn" style="padding: 15px 25px;" onclick="syncDelix()"><i class="fas fa-sync"></i> Refresh Delix Services Now</button>
        </div>
    `;
}

async function syncDelix() {
    if(!confirm("Fetch new services from Delix? This updates your whole store.")) return;
    const btn = document.getElementById("syncBtn");
    btn.innerHTML = "<span class='spinner'></span> Syncing...";
    btn.disabled = true;
    
    try {
        const res = await fetch(`${API}/services?refresh=true`);
        const data = await res.json();
        if (data.success) {
            showAlert('success', 'Store updated from Delix successfully!');
        } else {
            showAlert('error', 'Error: ' + (data.error || 'Unknown error'));
        }
    } catch(e) { 
        showAlert('error', 'Sync failed: ' + e.message);
    } finally {
        btn.innerHTML = "<i class='fas fa-sync'></i> Refresh Delix Services Now";
        btn.disabled = false;
    }
}

function editTickerItemUI(index) {
    const currentText = currentTickerItems[index];
    const row = document.getElementById(`ticker-row-${index}`);
    
    row.innerHTML = `
        <input type="text" id="edit-input-${index}" value="${currentText.replace(/"/g, '&quot;')}" style="flex: 1; padding: 10px; background: #0f172a; border: 1px solid var(--primary); border-radius: 6px; color: white;">
        <button class="btn-success" onclick="saveTickerItem(${index})" style="padding: 8px 16px;"><i class="fas fa-check"></i> Save</button>
        <button class="btn-danger" onclick="loadTicker()" style="padding: 8px 16px;"><i class="fas fa-times"></i> Cancel</button>
    `;
}

async function saveTickerItem(index) {
    const input = document.getElementById(`edit-input-${index}`);
    const newText = input.value.trim();
    if (!newText) {
        showAlert('error', 'Text cannot be empty');
        return;
    }

    const res = await adminFetch("/admin/ticker/edit", "PUT", { index, text: newText });
    
    if (res.success) {
        showAlert('success', 'Ticker item updated successfully!');
        loadTicker();
    } else {
        showAlert('error', 'Failed to update: ' + res.error);
    }
}

async function deleteTickerItem(index) {
    if (!confirm("Are you sure you want to delete this message?")) return;
    const res = await adminFetch("/admin/ticker/delete", "DELETE", { index });
    
    if (res.success) {
        showAlert('success', 'Ticker item deleted successfully!');
        loadTicker();
    } else {
        showAlert('error', 'Failed to delete: ' + res.error);
    }
}

async function addTickerItem() {
    const input = document.getElementById('newTickerItemInput');
    const btn = document.getElementById('addTickerBtn');
    const text = input.value.trim();
    
    if (!text) {
        showAlert('error', 'Please enter a message');
        return;
    }

    btn.innerHTML = '<span class="spinner"></span> Adding...';
    btn.disabled = true;

    const res = await adminFetch("/admin/ticker/add", "POST", { text });

    if (res.success) {
        input.value = '';
        showAlert('success', 'Ticker item added successfully!');
        loadTicker();
    } else {
        showAlert('error', 'Failed to add: ' + res.error);
        btn.innerHTML = '<i class="fas fa-plus"></i> Add Item';
        btn.disabled = false;
    }
}

async function updateTickerSpeed() {
    const speed = parseInt(document.getElementById('tickerSpeedInput').value);
    const btn = document.getElementById('speedBtn');
    
    if (isNaN(speed) || speed < 5) {
        showAlert('error', 'Speed must be a number greater than 5');

    }

    btn.innerHTML = '<span class="spinner"></span> Saving...';
    btn.disabled = true;

    const res = await adminFetch("/admin/ticker/speed", "PUT", { speed });
    
    if (res.success) {
        showAlert('success', 'Ticker speed updated successfully!');
    } else {
        showAlert('error', 'Failed to update speed: ' + res.error);
    }
    
    btn.innerHTML = '<i class="fas fa-save"></i> Save Speed';
    btn.disabled = false;
}

async function loadChatLogs() {

    if (data.error) {
        document.getElementById("contentArea").innerHTML = `<div class="card" style="color:var(--danger)">Failed to load logs: ${data.error}</div>`;
        return;
    }

    const logs = data.logs || [];
    const bannedIds = data.bannedUserIds || [];

    let html = `
        <div class="card" style="border-left: 5px solid var(--warning); margin-bottom: 20px;">
            <h3><i class="fas fa-gavel"></i> Chat Moderation Dashboard</h3>
            <p style="color: var(--text-dim); font-size: 14px;">Monitor all AI conversations in real-time. If a user violates terms, you can restrict their AI access for exactly 3 days.</p>
        </div>
        <div id="chatLogsContainer">
    `;

    if (logs.length === 0) {
        html += `<div class="card" style="text-align:center; color:var(--text-dim)">No chat logs yet.</div>`;
    } else {
        logs.forEach(log => {
            const isBanned = bannedIds.includes(log.userId);
            const date = new Date(log.createdAt).toLocaleString();
            
            html += `
                <div class="card" style="margin-bottom: 15px; border-left: 3px solid ${isBanned ? 'var(--danger)' : 'var(--primary)'};">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px;">
                        <div>
                            <b style="color: white;">${log.username || 'Unknown'}</b> 
                            <small style="color: var(--text-dim);">(${log.userEmail})</small>
                            ${isBanned ? '<span style="background: var(--danger); color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; margin-left: 10px;">BANNED</span>' : ''}
                        </div>
                        <small style="color: var(--text-dim);">${date}</small>
                    </div>
                    
                    <div style="background: #1e293b; padding: 10px; border-radius: 8px; margin-bottom: 8px;">
                        <small style="color: var(--primary); font-weight: bold;">USER:</small>
                        <p style="margin: 5px 0 0; color: white; word-break: break-word;">${log.userMessage}</p>
                    </div>
                    
                    <div style="background: rgba(34, 197, 94, 0.1); padding: 10px; border-radius: 8px; margin-bottom: 15px;">
                        <small style="color: var(--success); font-weight: bold;">AI REPLY:</small>
                        <p style="margin: 5px 0 0; color: #d1d5db; word-break: break-word; white-space: pre-wrap;">${log.aiReply}</p>
                    </div>

                    <div style="display: flex; gap: 10px; justify-content: flex-end;">
                        ${isBanned 
                            ? `<button class="btn-success" onclick="unbanChat('${log.userId}')"><i class="fas fa-unlock"></i> Unban User</button>` 
                            : `<button class="btn-danger" onclick="banChat('${log.userId}', '${log.userEmail}')"><i class="fas fa-gavel"></i> Ban for 3 Days</button>`
                        }
                    </div>
                </div>
            `;
        });
    }
    
    html += `</div>`;
    document.getElementById("contentArea").innerHTML = html;
}

async function banChat(userId, email) {
    const reason = prompt(`Ban ${email} from AI Chat for 3 days?\nEnter reason (optional):`);
    if (reason === null) return;
    
    const res = await adminFetch("/admin/ban-chat", "POST", { userId, reason: reason || "Terms violation" });
    if (res.success) {
        showAlert('success', 'User banned from chat for 3 days.');
        loadChatLogs();
    } else {
        showAlert('error', 'Failed: ' + res.error);
    }
}

async function unbanChat(userId) {
    if(!confirm("Remove chat ban for this user immediately?")) return;
    const res = await adminFetch("/admin/unban-chat", "POST", { userId });
    if (res.success) {
        showAlert('success', 'User unbanned successfully.');
        loadChatLogs();
    } else {
        showAlert('error', 'Failed: ' + res.error);
    }
}

        maintenanceStatus = settingsData.maintenance === true;
    } catch(e) {
        console.log("Could not fetch maintenance status");
    }
    
    document.getElementById("contentArea").innerHTML = `
        <div class="card">
            <h3><i class="fas fa-broadcast-tower"></i> Global Announcements</h3>
            <p style="color: var(--text-dim)">Send a push notification or banner to all active users on the main website.</p>
            <textarea id="announcementText" class="search-bar" style="height: 100px; resize: vertical;" placeholder="Type your message to all users..."></textarea>
            <button class="btn-balance" id="announceBtn" style="margin-top: 10px; padding: 12px 20px;" onclick="sendAnnouncement()"><i class="fas fa-paper-plane"></i> Broadcast to All Users</button>
        </div>
        
        <div class="card">
            <h3><i class="fas fa-tools"></i> System Maintenance</h3>
            
            <div class="maintenance-status ${maintenanceStatus ? 'offline' : 'online'}">
                <div class="status-icon ${maintenanceStatus ? 'offline' : 'online'}">
                    <i class="fas ${maintenanceStatus ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i>
                </div>
                <div class="status-text">
                    <h3 style="color: ${maintenanceStatus ? 'var(--danger)' : 'var(--success)'}">
                        ${maintenanceStatus ? 'MAINTENANCE MODE: ON' : 'MAINTENANCE MODE: OFF'}
                    </h3>
                    <p>${maintenanceStatus ? 'Website is currently BLOCKED for all users' : 'Website is ONLINE and accessible to all users'}</p>
                </div>
            </div>
            
            <div class="maintenance-buttons">
                <button class="btn-danger" id="maintOnBtn" onclick="turnMaintenanceOn()" ${maintenanceStatus ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>
                    <i class="fas fa-power-off"></i> Turn ON Maintenance
                </button>
                <button class="btn-success" id="maintOffBtn" onclick="turnMaintenanceOff()" ${!maintenanceStatus ? 'disabled style="opacity: 0.5; cursor: not-allowed;"' : ''}>
                    <i class="fas fa-play"></i> Turn OFF Maintenance
                </button>
            </div>
            
            <p style="color: var(--text-dim); font-size: 13px; margin-top: 15px;">
                <i class="fas fa-info-circle"></i> When maintenance is ON, users will see a maintenance page instead of the website.
            </p>
        </div>
        
        <div class="card">
            <h3><i class="fas fa-database"></i> Database Management</h3>
            <p style="color: var(--text-dim)">Clear cached data or reset specific system modules.</p>
            <button class="btn-balance" style="padding: 12px 20px; margin-right: 10px;" onclick="clearCache()"><i class="fas fa-broom"></i> Clear System Cache</button>
            <button class="btn-danger" style="padding: 12px 20px;" onclick="resetSystem()"><i class="fas fa-exclamation-triangle"></i> Reset Failed Transactions</button>
        </div>
    `;
}

async function sendAnnouncement() {
    const msg = document.getElementById('announcementText').value;
    const btn = document.getElementById('announceBtn');
    if(!msg) {
        showAlert('error', 'Please enter a message.');
        return;
    }
    
    btn.innerHTML = '<span class="spinner"></span> Sending...';
    btn.disabled = true;
    
    const res = await adminFetch("/admin/announce", "POST", { message: msg });
    
    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Broadcast to All Users';
    btn.disabled = false;
    
    if (res.success) {
        showAlert('success', 'Broadcast sent successfully!');
    } else {
        showAlert('error', 'Failed: ' + res.error);
    }
}

async function turnMaintenanceOn() {
    if(!confirm("⚠️ WARNING: This will BLOCK all users from accessing the website. Are you sure?")) return;
    
    const btn = document.getElementById('maintOnBtn');
    btn.innerHTML = '<span class="spinner"></span> Turning ON...';
    btn.disabled = true;
    
    const res = await adminFetch("/admin/maintenance", "POST", { action: "on" });
    if(res.success) {
        showAlert('success', 'Maintenance mode turned ON. Users cannot access the website.');
        loadSiteControl();
    } else {
        showAlert('error', 'Failed: ' + res.error);
        btn.innerHTML = '<i class="fas fa-power-off"></i> Turn ON Maintenance';
        btn.disabled = false;
    }
}

async function turnMaintenanceOff() {
    if(!confirm("Turn OFF maintenance mode? This will allow users to access the website again.")) return;
    
    const btn = document.getElementById('maintOffBtn');
    btn.innerHTML = '<span class="spinner"></span> Turning OFF...';
    btn.disabled = true;
    
    const res = await adminFetch("/admin/maintenance", "POST", { action: "off" });
    if(res.success) {
        showAlert('success', 'Maintenance mode turned OFF. Users can now access the website.');
        loadSiteControl();
    } else {
        showAlert('error', 'Failed: ' + res.error);
        btn.innerHTML = '<i class="fas fa-play"></i> Turn OFF Maintenance';
        btn.disabled = false;
    }
}

async function clearCache() {
    if(!confirm("Clear all system caches?")) return;
    const res = await adminFetch("/admin/clear-cache", "POST");
    if (res.success) {
        showAlert('success', 'Cache cleared.');
    } else {
        showAlert('error', 'Failed: ' + res.error);
    }
}

async function resetSystem() {
    if(!confirm("Reset all failed transactions? This cannot be undone.")) return;
    const res = await adminFetch("/admin/reset-failed", "POST");
    if (res.success) {
        showAlert('success', 'Failed transactions reset.');
    } else {
        showAlert('error', 'Failed: ' + res.error);
    }
}

/* --- UTILS --- */
function setActiveNav(id, title) {
    document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById("pageTitle").innerText = title;
}

function search() {
    let filter = document.querySelector(".search-bar").value.toUpperCase();
    let tr = document.getElementById("userTable").getElementsByTagName("tr");
    for (let i = 1; i < tr.length; i++) {
        tr[i].style.display = tr[i].innerText.toUpperCase().includes(filter) ? "" : "none";
    }
}

window.onload = function() {
    loadStats();
};
</script>
</body>
  </html>
